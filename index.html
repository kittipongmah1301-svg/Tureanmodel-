<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แนะนำตัว - กาฟิวส์</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Prompt", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            width: 350px;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .profile {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #ddd;
            margin: 0 auto 20px;
            overflow: hidden;
        }

        .profile img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        p {
            color: #666;
            margin-bottom: 15px;
        }

        .social a {
            text-decoration: none;
            color: white;
            background: #4facfe;
            padding: 10px 15px;
            border-radius: 10px;
            margin: 5px;
            display: inline-block;
            transition: 0.3s;
        }

        .social a:hover {
            background: #008cff;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="profile">
            <img src="https://via.placeholder.com/120" alt="รูปโปรไฟล์">
        </div>

        <h1>สวัสดีครับ 👋</h1>
        <h2>ผมชื่อ กาฟิวส์</h2>

        <p>
            ยินดีต้อนรับสู่เว็บไซต์แนะนำตัวของผม<br>
            ผมสนใจด้านเทคโนโลยี การเขียนโปรแกรม และการเรียนรู้สิ่งใหม่ ๆ
        </p>

        <div class="social">
            <a href="#">Facebook</a>
            <a href="#">Instagram</a>
            <a href="#">GitHub</a>
        </div>
    </div>

</body>
</html>
